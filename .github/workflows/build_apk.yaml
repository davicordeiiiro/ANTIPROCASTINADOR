name: Build Flet APK Android

on:
  push:
    branches: 
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java (Requirement for Android)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Build APK
        run: |
          flet build apk --project "Antiprocrastinador"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Antiprocrastinador-Android-APK
          path: build/apk/**/*.apk

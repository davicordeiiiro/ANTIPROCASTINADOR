<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Distração Bloqueada!</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="block.css">
</head>
<body>
  <div class="container">
    <div class="icon">🛑</div>
    <h1>Volte a Estudar!</h1>
    <p>O acesso a <strong id="domainName">este site</strong> está bloqueado neste momento.</p>
    <div class="focus-board">
      <p>Você tem um ciclo de foco em andamento para:</p>
      <h2 id="techName">Sua Tarefa</h2>
    </div>
    <p class="sub">"Disciplina é a ponte entre metas e realizações."</p>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    document.getElementById('domainName').textContent = urlParams.get('domain') || 'este site';
    document.getElementById('techName').textContent = urlParams.get('tech') || 'Foco Atual';
  </script>
</body>
</html>
